/* 顶部导航区域及右上角语言按钮样式 */
.header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0e0;position:relative}
h1{font-size:15px;font-weight:600;margin-bottom:10px;color:#1a1a1a;padding-right:90px;} /* 留出右上角空间 */

.top-right-actions {
  position: absolute;
  top: 10px;
  right: 16px;
  display: flex;
  align-items: center;
}
.action-btn {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #fff;
  color: #333;
  cursor: pointer;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.action-btn:active { background: #f5f5f7; }

.tab-bar{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap}
.tab-bar button{font-size:12px;padding:6px 12px;border-radius:20px;background:#f2f2f7;border:none;color:#666;cursor:pointer;font-family:inherit}
.tab-bar button.active{background:#1a1a1a;color:#fff;font-weight:500}

.controls{background:#fff;padding:10px 16px;border-bottom:1px solid #e0e0e0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.controls select{font-size:12px;padding:5px 8px;border-radius:8px;background:#f2f2f7;color:#1a1a1a;border:none;font-family:inherit;-webkit-appearance:none;appearance:none;padding-right:20px}
.controls input{font-size:12px;padding:6px 10px;border-radius:8px;background:#f2f2f7;color:#1a1a1a;border:none;font-family:inherit;width:140px}
.controls label{font-size:12px;color:#666}

.legend{background:#fff;padding:8px 16px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:5px;font-size:11px;color:#666;flex-wrap:wrap}
.lg{display:flex;gap:2px}
.lg span{width:16px;height:11px;border-radius:2px;display:inline-block}

.stats{background:#f2f2f7;padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap}
.stat{background:#fff;border-radius:8px;padding:5px 10px;font-size:11px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}

.tbl-outer{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff;margin:0}
table{border-collapse:collapse;width:max-content;min-width:100%}
thead tr th{background:#f7f7f7;padding:8px 10px;font-size:11px;font-weight:600;color:#555;border-bottom:1.5px solid #ddd;white-space:nowrap;text-align:center;border-right:1px solid #eee}
thead tr th:first-child{text-align:left;min-width:95px}
thead tr th:nth-child(2){min-width:45px}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:nth-child(even){background:#fafafa}
td{padding:5px 8px;font-size:11px;white-space:nowrap;border-right:1px solid #f0f0f0;text-align:right}
td:first-child{text-align:left;font-weight:600;color:#1a1a1a;min-width:95px;background:inherit}
td:nth-child(2){font-size:10px;color:#999;text-align:center}
td.val{font-weight:600;font-size:11px;border-radius:0}
.note{background:#f2f2f7;padding:10px 16px;font-size:11px;color:#aaa;line-height:1.5}

/* 移动端优化 */
@media(max-width: 480px) {

  .top-right-actions { top: 8px; right: 8px; }

  if(v>=10) return '#f1948a';
  if(v>=0)  return '#fadbd8';
  if(v>=-10) return '#d5f5e3';
  if(v>=-25) return '#82e0aa';
  if(v>=-40) return '#27ae60';
  if(v>=-60) return '#1e8449';
  return '#145a32';
}
function heatTxt(v){
  if(v>=50) return '#fff';
  if(v>=10) return '#7f0c0c';
  if(v>=0)  return '#922b21';
  if(v>=-25) return '#0a3d62';
  return '#fff';
}
function avg(d){return Math.round(d.reduce(function(a,b){return a+b},0)/d.length);}
function fmt(v){return (v>0?'+':'')+v+'%';}

function getFiltered(){
  var cat=document.getElementById('catFilter').value;
  var q=document.getElementById('search').value.trim().toLowerCase();
  var rows=DATA.filter(function(r){
    var matchCat = (cat==='all'||r.c===cat);
    var nameStr = (r.n + " " + r.en).toLowerCase();
    return matchCat && (q==='' || nameStr.indexOf(q)>=0);
  });
  var sort=document.getElementById('sortBy').value;
  if(sort==='cat') rows.sort(function(a,b){return a.c<b.c?-1:a.c>b.c?1:0;});
  else if(sort==='avg') rows.sort(function(a,b){return avg(b.d)-avg(a.d);});
  else{var yi=parseInt(sort.replace('y',''))-2020;rows.sort(function(a,b){return b.d[yi]-a.d[yi];});}
  return rows;
}

function renderStats(rows){
  var t = i18n[currentLang];
  if(rows.length === 0){
    document.getElementById('statRow').innerHTML = '<div class="stat">No data</div>';
    return;
  }
  var allVals=[];
  rows.forEach(function(r){r.d.forEach(function(v){allVals.push(v);});});
  var maxV=Math.max.apply(null,allVals),minV=Math.min.apply(null,allVals);
  var maxR=rows.filter(function(r){return r.d.indexOf(maxV)>=0;})[0];
  var minR=rows.filter(function(r){return r.d.indexOf(minV)>=0;})[0];
  var maxY=YEARS[maxR.d.indexOf(maxV)],minY=YEARS[minR.d.indexOf(minV)];
  
  var nameMax = currentLang === "zh" ? maxR.n : maxR.en;
  var nameMin = currentLang === "zh" ? minR.n : minR.en;
  
  document.getElementById('statRow').innerHTML=
    '<div class="stat">'+t.statCount+'<b>'+rows.length+'</b></div>'+
    '<div class="stat">'+t.statMaxW+'<b style="color:#c0392b">+'+maxV+'% '+nameMax+'('+maxY+')</b></div>'+
    '<div class="stat">'+t.statMinW+'<b style="color:#27ae60">'+minV+'% '+nameMin+'('+minY+')</b></div>';
}

function renderHeat(rows){
  var t = i18n[currentLang];
  var th='<th>'+t.thSec+'</th><th>'+t.thCat+'</th>';
  YEARS.forEach(function(y){th+='<th>'+y+'</th>';});
  th+='<th>'+t.thAvg+'</th>';
  document.getElementById('thead').innerHTML=th;
  var html='';
  rows.forEach(function(r){
    var cells='';
    r.d.forEach(function(v){
      cells+='<td class="val" style="background:'+heatBg(v)+';color:'+heatTxt(v)+'">'+fmt(v)+'</td>';
    });
    var a=avg(r.d);
    cells+='<td class="val" style="background:'+heatBg(a)+';color:'+heatTxt(a)+';opacity:.85">'+fmt(a)+'</td>';
    var name = currentLang === "zh" ? r.n : r.en;
    html+='<tr><td>'+name+'</td><td style="font-size:10px;color:#999;text-align:center">'+r.c+'</td>'+cells+'</tr>';
  });
  document.getElementById('tbody').innerHTML=html;
}

function renderRank(rows){
  var t = i18n[currentLang];
  var th='<th>'+t.thSec+'</th><th>'+t.thCat+'</th>';
  YEARS.forEach(function(y){th+='<th>'+y+'</th>';});
  document.getElementById('thead').innerHTML=th;
  var total=rows.length;
  var rankMaps=YEARS.map(function(_,yi){
    var sorted=rows.slice().sort(function(a,b){return b.d[yi]-a.d[yi];});
    var m={};sorted.forEach(function(r,i){m[r.n]=i+1;});return m;
  });
  var html='';
  rows.forEach(function(r){
    var cells='';
    YEARS.forEach(function(_,yi){
      var rk=rankMaps[yi][r.n]||'-';
      var bg='',tc='#666';
      if(typeof rk==='number' && total > 0){
        var p=rk/total;
        if(p<=0.1){bg='#c0392b';tc='#fff';}
        else if(p<=0.25){bg='#f1948a';tc='#7f0c0c';}
        else if(p>=0.9){bg='#27ae60';tc='#fff';}
        else if(p>=0.75){bg='#82e0aa';tc='#0a3d62';}
      }
      cells+='<td class="val" style="background:'+bg+';color:'+tc+'">'+rk+'</td>';
    });
    var name = currentLang === "zh" ? r.n : r.en;
    html+='<tr><td>'+name+'</td><td style="font-size:10px;color:#999;text-align:center">'+r.c+'</td>'+cells+'</tr>';
  });
  document.getElementById('tbody').innerHTML=html;
}

function renderBest(rows){
  var t = i18n[currentLang];
  document.getElementById('thead').innerHTML=
    '<th>'+t.thSec+'</th><th>'+t.thCat+'</th><th>'+t.thBestY+'</th><th>'+t.thBestW+'</th><th>'+t.thWorstY+'</th><th>'+t.thWorstW+'</th><th>'+t.thAvgW+'</th><th>'+t.thWinR+'</th>';
  var sorted=rows.slice().sort(function(a,b){return avg(b.d)-avg(a.d);});
  var html='';
  sorted.forEach(function(r){
    var maxV=Math.max.apply(null,r.d),minV=Math.min.apply(null,r.d);
    var maxY=YEARS[r.d.indexOf(maxV)],minY=YEARS[r.d.indexOf(minV)];
    var a=avg(r.d);
    var wins=r.d.filter(function(v){return v>0;}).length;
    var wr=Math.round(wins/r.d.length*100);
    var bar='<div style="display:flex;align-items:center;gap:3px"><div style="width:'+(wr*0.4)+'px;height:7px;background:'+(wr>=50?'#e74c3c':'#82e0aa')+';border-radius:2px"></div><span style="font-size:10px">'+wr+'%</span></div>';
    var name = currentLang === "zh" ? r.n : r.en;
    html+='<tr>'+
      '<td>'+name+'</td>'+
      '<td style="font-size:10px;color:#999;text-align:center">'+r.c+'</td>'+
      '<td style="color:#c0392b;font-weight:600;text-align:center">'+maxY+'</td>'+
      '<td style="color:#c0392b;font-weight:600">+'+maxV+'%</td>'+
      '<td style="color:#27ae60;font-weight:600;text-align:center">'+minY+'</td>'+
      '<td style="color:#27ae60;font-weight:600">'+minV+'%</td>'+
      '<td style="font-weight:600;color:'+(a>=0?'#c0392b':'#27ae60')+'">'+(a>=0?'+':'')+a+'%</td>'+
      '<td>'+bar+'</td>'+
    '</tr>';
  });
  document.getElementById('tbody').innerHTML=html;
}

function render(){
  var rows=getFiltered();
  renderStats(rows);
  if(currentView==='heat') renderHeat(rows);
  else if(currentView==='rank') renderRank(rows);
  else renderBest(rows);
}

function setView(v,btn){
  currentView=v;
  var btns=document.querySelectorAll('.tab-bar button');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

// 页面初始化加载数据
render();
</script>
</body>
</html>
